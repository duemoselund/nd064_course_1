namespace: 
  name: sandbox

service:
  port: 4111
  targetport: 3111
  protocol: TCP
  type: ClusterIP

image:
  repository: techtrends
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  request:
    memory: 64Mi
    cpu: 250m
  limits:
    memory: 128Mi
    cpu: 500m

livenessProbe:
  httpGet:
    path: /healthz
    port: 3111
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: 3111
  initialDelaySeconds: 5
  periodSeconds: 10

  